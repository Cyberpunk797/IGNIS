base_model: "REPLACE_WITH_CODE_MODEL"
output_dir: "runs/train_logs/qlora_run_001"
load_in_4bit: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "bfloat16"
lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
training:
  seed: 17
  max_seq_length: 3584
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  num_train_epochs: 2
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 200
  bf16: true
  gradient_checkpointing: true
data:
  train_path: "dataset/build/train.jsonl"
  validation_path: "dataset/build/validation.jsonl"
  prompt_style: "axlu_cpp_reasoning_v1"
